<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda — Lab Lamego</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f2ee; --surface: #fff; --border: #e2ddd6; --border2: #c8c2b8;
  --text: #1a1816; --text2: #6b6560; --text3: #a09990;
  --green: #1a6b4a; --green-bg: #e8f4ef; --green-bd: #a8d5be;
  --blue: #1a5c8a; --blue-bg: #e6f1f8;
  --orange: #b85c00; --orange-bg: #fdf0e6;
  --purple: #6b3fa0; --purple-bg: #f0ebfa;
  --red: #c0392b; --red-bg: #fdecea;
  --r: 10px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; display: flex; align-items: center;
  justify-content: space-between; height: 56px;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
.logo span { color: var(--green); }
.date-nav { display: flex; align-items: center; gap: 8px; position: relative; }
.nav-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  width: 30px; height: 30px; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2); transition: all .15s;
}
.nav-btn:hover { border-color: var(--border2); color: var(--text); }
#lbl-date {
  font-family: 'DM Mono', monospace; font-size: 13px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 12px; cursor: pointer;
  min-width: 116px; text-align: center; user-select: none;
  transition: border-color .15s;
}
#lbl-date:hover { border-color: var(--border2); }
.btn-new {
  background: var(--green); color: #fff; border: none;
  border-radius: 7px; padding: 0 16px; height: 32px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity .15s;
}
.btn-new:hover { opacity: .88; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); transition: background .3s; }
.sync-dot.ok { background: var(--green); }
.sync-dot.err { background: var(--red); }
.sync-dot.loading { background: var(--orange); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

/* DASHBOARD */
.dashboard {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 24px; display: grid;
  grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.dash-card {
  background: var(--bg); border-radius: var(--r);
  padding: 12px 14px; display: flex; flex-direction: column; gap: 4px;
}
.dash-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
.dash-num { font-size: 26px; font-weight: 600; line-height: 1; }
.dash-num.green  { color: var(--green); }
.dash-num.blue   { color: var(--blue); }
.dash-num.red    { color: var(--red); }
.dash-num.orange { color: var(--orange); }
.dash-sub { font-size: 11px; color: var(--text3); }

/* CALENDAR */
#cal {
  display: none; position: absolute; top: 46px; left: 50%;
  transform: translateX(-50%); background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px; padding: 12px;
  z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,.12); min-width: 244px;
}
#cal.show { display: block; }
.cal-hd { display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 600; margin-bottom: 10px; }
.cal-hd button { background: none; border: 1px solid var(--border); border-radius: 6px; width: 26px; height: 26px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text2); }
.cal-hd button:hover { border-color: var(--border2); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-wk { height: 28px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text3); }
.cal-d { height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 12px; cursor: pointer; color: var(--text); transition: background .1s; }
.cal-d:hover { background: var(--bg); }
.cal-d.today { color: var(--green); font-weight: 600; }
.cal-d.cur { background: var(--green) !important; color: #fff !important; font-weight: 600; }

/* GRID */
.wrap { padding: 20px 24px; max-width: 900px; margin: 0 auto; }
.day-lbl { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-left: 54px; }
.slots { display: flex; flex-direction: column; gap: 4px; }

/* TIME GROUP */
.time-group { display: grid; grid-template-columns: 46px 1fr; gap: 8px; }
.slot-time { display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-start; padding-top: 14px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); }
.slot-time .hh { font-size: 14px; color: var(--text2); font-weight: 500; }
.time-cards { display: flex; flex-direction: column; gap: 4px; flex: 1; }

/* CARD */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 10px 14px;
  display: flex; align-items: center; gap: 12px;
  transition: border-color .15s, box-shadow .15s; min-height: 60px;
}
.card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,.05); }
.card.confirmed { border-left: 3px solid var(--green); }
.card-add {
  background: transparent; border: 1px dashed var(--border);
  border-radius: var(--r); padding: 8px 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; min-height: 40px; transition: border-color .15s;
  color: var(--text3); font-size: 13px; gap: 6px;
}
.card-add:hover { border-color: var(--green); color: var(--green); }

.chk {
  width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0;
  border: 1.5px solid var(--border2); display: flex; align-items: center;
  justify-content: center; font-size: 11px; cursor: pointer;
  transition: all .15s; color: transparent; background: transparent;
}
.chk:hover { border-color: var(--green); }
.confirmed .chk { background: var(--green); border-color: var(--green); color: #fff; }

.info { flex: 1; min-width: 0; }
.pname { font-size: 14px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 4px; }
.tag.sus     { background: var(--blue-bg);   color: var(--blue); }
.tag.part    { background: #f0f0f0;           color: var(--text2); }
.tag.pclab   { background: var(--orange-bg); color: var(--orange); }
.tag.pardini { background: var(--purple-bg); color: var(--purple); }
.tag.mat     { background: var(--red-bg);    color: var(--red); }

.actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
.card:hover .actions { opacity: 1; }
.ico { background: none; border: 1px solid var(--border); border-radius: 5px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; color: var(--text2); transition: all .15s; }
.ico:hover { border-color: var(--border2); color: var(--text); }
.ico.del:hover { border-color: var(--red); color: var(--red); }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 300; align-items: center; justify-content: center; padding: 16px; }
.overlay.show { display: flex; }
.modal { background: var(--surface); border-radius: 14px; padding: 24px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal-hd { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.fg { margin-bottom: 14px; }
.fg label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; font-weight: 500; }
.fg input, .fg select {
  width: 100%; border: 1px solid var(--border); border-radius: 7px;
  padding: 9px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text); outline: none; transition: border-color .15s;
}
.fg input:focus, .fg select:focus { border-color: var(--green); }
.fg select { appearance: none; -webkit-appearance: none; cursor: pointer; padding-right: 32px;
  background-image: url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%228%22 viewBox=%220 0 12 8%22><path d=%22M1 1l5 5 5-5%22 stroke=%22%236b6560%22 stroke-width=%221.5%22 fill=%22none%22 stroke-linecap=%22round%22/></svg>');
  background-repeat: no-repeat; background-position: right 12px center;
}
.time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.togs { display: flex; flex-direction: column; gap: 8px; }
.tog { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all .15s; user-select: none; }
.tog:hover { border-color: var(--border2); background: var(--bg); }
.tog.on { border-color: var(--green-bd); background: var(--green-bg); }
.tog span { font-size: 13px; font-weight: 500; }
.sw { width: 32px; height: 18px; border-radius: 9px; background: var(--border2); position: relative; transition: background .2s; flex-shrink: 0; }
.sw::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: transform .2s; }
.tog.on .sw { background: var(--green); }
.tog.on .sw::after { transform: translateX(14px); }
.mfoot { display: flex; gap: 8px; margin-top: 20px; }
.btn-cancel { flex: 1; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; color: var(--text2); transition: all .15s; }
.btn-cancel:hover { border-color: var(--border2); color: var(--text); }
.btn-save { flex: 2; background: var(--green); border: none; border-radius: 8px; padding: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: #fff; cursor: pointer; transition: opacity .15s; }
.btn-save:hover { opacity: .88; }
.btn-save:disabled { opacity: .5; cursor: default; }

@media (max-width: 600px) {
  .dashboard { grid-template-columns: repeat(2, 1fr); }
  header, .dashboard { padding-left: 14px; padding-right: 14px; }
  .wrap { padding: 14px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Lab <span>Lamego</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="date-nav">
      <button class="nav-btn" onclick="moveDay(-1)">&#8249;</button>
      <span id="lbl-date" onclick="toggleCal()">--/--/----</span>
      <button class="nav-btn" onclick="moveDay(1)">&#8250;</button>
      <div id="cal"></div>
    </div>
    <div class="sync-dot" id="sync-dot"></div>
    <button class="btn-new" onclick="openModal(null,null)">+ Novo</button>
  </div>
</header>

<div class="dashboard">
  <div class="dash-card">
    <div class="dash-label">Pacientes</div>
    <div class="dash-num" id="d-total">0</div>
    <div class="dash-sub" id="d-sub">agendados hoje</div>
  </div>
  <div class="dash-card">
    <div class="dash-label">Confirmados</div>
    <div class="dash-num green" id="d-conf">0</div>
    <div class="dash-sub" id="d-conf-sub">aguardando confirmação</div>
  </div>
  <div class="dash-card">
    <div class="dash-label">SUS</div>
    <div class="dash-num blue" id="d-sus">0</div>
    <div class="dash-sub">pacientes SUS</div>
  </div>
  <div class="dash-card">
    <div class="dash-label">C/ material</div>
    <div class="dash-num red" id="d-mat">0</div>
    <div class="dash-sub">a retirar</div>
  </div>
</div>

<div class="wrap">
  <div class="day-lbl" id="lbl-day"></div>
  <div class="slots" id="slots"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="onBg(event)">
  <div class="modal">
    <div class="modal-hd" id="m-title">Novo agendamento</div>
    <div class="fg">
      <label>Horário</label>
      <div class="time-row">
        <select id="f-hora"></select>
        <select id="f-min"></select>
      </div>
    </div>
    <div class="fg">
      <label>Nome do paciente</label>
      <input type="text" id="f-nome" placeholder="Nome completo" autocomplete="off">
    </div>
    <div class="togs">
      <div class="tog" id="t-sus"      onclick="tog('sus')">     <span>É SUS?</span>                  <div class="sw"></div></div>
      <div class="tog" id="t-pclab"    onclick="tog('pclab')">   <span>Cadastrado no PcLab?</span>     <div class="sw"></div></div>
      <div class="tog" id="t-pardini"  onclick="tog('pardini')"> <span>Cadastrado no Pardini?</span>   <div class="sw"></div></div>
      <div class="tog" id="t-material" onclick="tog('material')"><span>Tem material a retirar?</span> <div class="sw"></div></div>
    </div>
    <div class="mfoot">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="save()">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc, deleteField }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj6UT7PMaCaNeDSG3bSThcxDp8Qz30r8g",
  authDomain: "agenda-lamego.firebaseapp.com",
  databaseURL: "https://agenda-lamego-default-rtdb.firebaseio.com",
  projectId: "agenda-lamego",
  storageBucket: "agenda-lamego.firebasestorage.app",
  messagingSenderId: "487003697960",
  appId: "1:487003697960:web:82bd83cf73fb8c8fcf561d"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const HOURS   = ['07','08','09','10','11'];
const MINUTES = ['00','05','10','15','20','25','30','35','40','45','50','55'];
const DAYS_PT = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const MONTHS  = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// ── utils ──────────────────────────────────────────────
function d2s(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function s2d(s) { const p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function today() { return d2s(new Date()); }
function fmt(s) { const p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ── state ──────────────────────────────────────────────
// dayData estrutura: { "07:00": [ {id, nome, sus, pclab, pardini, material, confirmed}, ... ], ... }
let cur = today();
let dayData = {};
let unsubscribe = null;
let editTime = null;   // horário que está sendo editado
let editId   = null;   // id do paciente (null = novo)
let F = {sus:false, pclab:false, pardini:false, material:false};
let calY, calM;

// ── sync indicator ─────────────────────────────────────
function setSync(s) { document.getElementById('sync-dot').className = 'sync-dot '+s; }

// ── firestore ──────────────────────────────────────────
function docRef() { return doc(db,'agenda',cur); }

function subscribeDay() {
  if (unsubscribe) unsubscribe();
  setSync('loading');
  unsubscribe = onSnapshot(docRef(),
    snap => { dayData = snap.exists() ? (snap.data().slots||{}) : {}; setSync('ok'); render(); },
    err  => { console.error(err); setSync('err'); }
  );
}

async function persistData(newData) {
  setSync('loading');
  try {
    const snap = await getDoc(docRef());
    if (!snap.exists()) await setDoc(docRef(), {slots: newData});
    else await updateDoc(docRef(), {slots: newData});
    setSync('ok');
  } catch(e) { console.error(e); setSync('err'); }
}

// ── render ─────────────────────────────────────────────
function render() {
  document.getElementById('lbl-date').textContent = fmt(cur);
  document.getElementById('lbl-day').textContent  = DAYS_PT[s2d(cur).getDay()];

  // Dashboard
  var total=0, conf=0, sus=0, mat=0;
  Object.values(dayData).forEach(function(arr) {
    if (!Array.isArray(arr)) return;
    arr.forEach(function(p) {
      total++;
      if (p.confirmed) conf++;
      if (p.sus) sus++;
      if (p.material) mat++;
    });
  });
  document.getElementById('d-total').textContent    = total;
  document.getElementById('d-conf').textContent     = conf;
  document.getElementById('d-sus').textContent      = sus;
  document.getElementById('d-mat').textContent      = mat;
  document.getElementById('d-sub').textContent      = total===1?'agendado hoje':'agendados hoje';
  document.getElementById('d-conf-sub').textContent = (total-conf)===1?'aguardando confirmação':'aguardando confirmação';

  // Slots
  var times = Object.keys(dayData).filter(function(k){ return Array.isArray(dayData[k]) && dayData[k].length>0; });
  times.sort();

  const cont = document.getElementById('slots');
  cont.innerHTML = '';

  if (times.length === 0) {
    cont.innerHTML = '<div style="text-align:center;padding:48px 0;color:var(--text3);font-size:14px">Nenhum agendamento. Clique em <b>+ Novo</b> para começar.</div>';
    return;
  }

  times.forEach(function(t) {
    const pacientes = dayData[t];
    const group = document.createElement('div');
    group.className = 'time-group';
    group.style.marginBottom = '10px';

    const hh = t.split(':')[0];
    const mm = t.split(':')[1];
    const timeEl = document.createElement('div');
    timeEl.className = 'slot-time';
    timeEl.innerHTML = '<span class="hh">'+hh+'</span><span>'+mm+'</span>';
    group.appendChild(timeEl);

    const cardsWrap = document.createElement('div');
    cardsWrap.className = 'time-cards';

    pacientes.forEach(function(p, idx) {
      const card = document.createElement('div');
      card.className = 'card'+(p.confirmed?' confirmed':'');
      var tags = '<span class="tag '+(p.sus?'sus':'part')+'">'+(p.sus?'SUS':'Particular')+'</span>';
      if (p.pclab)    tags += '<span class="tag pclab">PcLab</span>';
      if (p.pardini)  tags += '<span class="tag pardini">Pardini</span>';
      if (p.material) tags += '<span class="tag mat">Material</span>';
      card.innerHTML =
        '<div class="chk" onclick="window.toggleConfirm(\''+t+'\',\''+p.id+'\')">✓</div>'+
        '<div class="info">'+
          '<div class="pname">'+p.nome+'</div>'+
          '<div class="tags">'+tags+'</div>'+
        '</div>'+
        '<div class="actions">'+
          '<button class="ico" onclick="window.openModal(\''+t+'\',\''+p.id+'\')" title="Editar">✎</button>'+
          '<button class="ico del" onclick="window.delPaciente(\''+t+'\',\''+p.id+'\')" title="Remover">✕</button>'+
        '</div>';
      cardsWrap.appendChild(card);
    });

    // Botão de adicionar outro paciente no mesmo horário
    const addBtn = document.createElement('div');
    addBtn.className = 'card-add';
    addBtn.onclick = function(){ window.openModal(t, null); };
    addBtn.innerHTML = '+ adicionar paciente neste horário';
    cardsWrap.appendChild(addBtn);

    group.appendChild(cardsWrap);
    cont.appendChild(group);
  });
}

// ── actions ────────────────────────────────────────────
window.toggleConfirm = function(t, id) {
  var arr = (dayData[t]||[]).map(function(p){
    return p.id===id ? Object.assign({},p,{confirmed:!p.confirmed}) : p;
  });
  var newData = Object.assign({},dayData); newData[t]=arr;
  persistData(newData);
};

window.delPaciente = function(t, id) {
  if (!confirm('Remover este paciente?')) return;
  var arr = (dayData[t]||[]).filter(function(p){ return p.id!==id; });
  var newData = Object.assign({},dayData);
  if (arr.length===0) delete newData[t]; else newData[t]=arr;
  persistData(newData);
};

// ── modal ──────────────────────────────────────────────
function initSelects() {
  const selH = document.getElementById('f-hora');
  const selM = document.getElementById('f-min');
  if (selH.options.length) return;
  HOURS.forEach(function(h){ var o=document.createElement('option'); o.value=h; o.textContent=h+'h'; selH.appendChild(o); });
  MINUTES.forEach(function(m){ var o=document.createElement('option'); o.value=m; o.textContent=':'+m; selM.appendChild(o); });
}

window.openModal = function(t, id) {
  initSelects();
  editTime = t;
  editId   = id;

  var defaultT = t || '07:00';
  document.getElementById('f-hora').value = defaultT.split(':')[0];
  document.getElementById('f-min').value  = defaultT.split(':')[1]||'00';

  var p = null;
  if (t && id) {
    var arr = dayData[t]||[];
    p = arr.find(function(x){ return x.id===id; })||null;
  }

  document.getElementById('m-title').textContent = p ? 'Editar paciente' : 'Novo agendamento';
  document.getElementById('f-nome').value = p ? p.nome : '';
  F = {sus:!!(p&&p.sus), pclab:!!(p&&p.pclab), pardini:!!(p&&p.pardini), material:!!(p&&p.material)};
  ['sus','pclab','pardini','material'].forEach(function(k){
    document.getElementById('t-'+k).classList.toggle('on',F[k]);
  });
  document.getElementById('overlay').classList.add('show');
  setTimeout(function(){ document.getElementById('f-nome').focus(); },80);
};

window.closeModal = function() { document.getElementById('overlay').classList.remove('show'); };
window.onBg = function(e) { if(e.target===document.getElementById('overlay')) window.closeModal(); };
window.tog = function(k) { F[k]=!F[k]; document.getElementById('t-'+k).classList.toggle('on',F[k]); };

window.save = async function() {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { document.getElementById('f-nome').focus(); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;

  const hora    = document.getElementById('f-hora').value;
  const min     = document.getElementById('f-min').value;
  const newTime = hora+':'+min;

  var newData = JSON.parse(JSON.stringify(dayData)); // deep copy

  if (editId) {
    // Editando paciente existente
    // Remove do horário antigo
    if (editTime) {
      newData[editTime] = (newData[editTime]||[]).filter(function(p){ return p.id!==editId; });
      if (newData[editTime].length===0) delete newData[editTime];
    }
    // Adiciona no novo horário
    var paciente = {id: editId, nome:nome, sus:F.sus, pclab:F.pclab, pardini:F.pardini, material:F.material, confirmed:false};
    // Tenta preservar confirmed do original
    if (editTime && dayData[editTime]) {
      var orig = (dayData[editTime]||[]).find(function(p){ return p.id===editId; });
      if (orig) paciente.confirmed = orig.confirmed||false;
    }
    if (!newData[newTime]) newData[newTime]=[];
    newData[newTime].push(paciente);
  } else {
    // Novo paciente
    if (!newData[newTime]) newData[newTime]=[];
    newData[newTime].push({id:uid(), nome:nome, sus:F.sus, pclab:F.pclab, pardini:F.pardini, material:F.material, confirmed:false});
  }

  await persistData(newData);
  btn.disabled = false;
  window.closeModal();
};

// ── nav ────────────────────────────────────────────────
window.moveDay = function(dir) { var d=s2d(cur); d.setDate(d.getDate()+dir); cur=d2s(d); subscribeDay(); };

window.toggleCal = function() {
  const el=document.getElementById('cal');
  if(el.classList.contains('show')){el.classList.remove('show');return;}
  var d=s2d(cur); calY=d.getFullYear(); calM=d.getMonth();
  drawCal(); el.classList.add('show');
};

function drawCal() {
  const tdStr=today(), first=new Date(calY,calM,1), last=new Date(calY,calM+1,0), dow=first.getDay();
  var h='<div class="cal-hd"><button onclick="window.calNav(-1)">&#8249;</button><span>'+MONTHS[calM]+' '+calY+'</span><button onclick="window.calNav(1)">&#8250;</button></div><div class="cal-grid">';
  ['D','S','T','Q','Q','S','S'].forEach(function(w){h+='<div class="cal-wk">'+w+'</div>';});
  for(var i=0;i<dow;i++) h+='<div></div>';
  for(var d=1;d<=last.getDate();d++){
    var ds=d2s(new Date(calY,calM,d));
    h+='<div class="cal-d'+(ds===cur?' cur':ds===tdStr?' today':'')+'" onclick="window.pickDay(\''+ds+'\')">'+d+'</div>';
  }
  h+='</div>';
  document.getElementById('cal').innerHTML=h;
}

window.calNav = function(dir){ calM+=dir; if(calM>11){calM=0;calY++;} if(calM<0){calM=11;calY--;} drawCal(); };
window.pickDay = function(ds){ cur=ds; document.getElementById('cal').classList.remove('show'); subscribeDay(); };

document.addEventListener('click',function(e){
  var cal=document.getElementById('cal'), lbl=document.getElementById('lbl-date');
  if(cal.classList.contains('show')&&!cal.contains(e.target)&&e.target!==lbl) cal.classList.remove('show');
});
document.addEventListener('keydown',function(e){ if(e.key==='Escape') window.closeModal(); });

subscribeDay();
</script>
